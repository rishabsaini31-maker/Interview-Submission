openapi: 3.0.0
info:
  title: Product API
  version: 1.0.0
  description: Production-ready REST API for products with cursor pagination

servers:
  - url: http://localhost:3000
    description: Development server

paths:
  /products:
    get:
      summary: Get products with cursor pagination
      description: Returns products sorted by updated_at DESC, id DESC with cursor pagination
      parameters:
        - name: cursor
          in: query
          description: Base64 encoded cursor for pagination (format: updatedAt|id)
          schema:
            type: string
        - name: category
          in: query
          description: Filter products by category
          schema:
            type: string
        - name: limit
          in: query
          description: Number of products to return (default: 20, max: 100)
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  products:
                    type: array
                    items:
                      $ref: '#/components/schemas/Product'
                  nextCursor:
                    type: string
                    nullable: true
                  hasMore:
                    type: boolean
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /health:
    get:
      summary: Health check endpoint
      description: Returns server health status
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  timestamp:
                    type: string
                    format: date-time

components:
  schemas:
    Product:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        category:
          type: string
        price:
          type: number
          format: double
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Error:
      type: object
      properties:
        error:
          type: string
        stack:
          type: string